{{ define "main" }}

<div style="margin-left:300px; padding:20px; max-width:800px;">

  <!-- 🔹 Breadcrumb -->
  <div style="margin-bottom:15px; font-size:14px; color:#888;">
    <a href="/" style="color:#888;">Home</a>

    {{ with .Parent }}
      > <a href="{{ .RelPermalink }}" style="color:#888;">{{ .Title }}</a>
    {{ end }}

    > <span style="color:#ccc;">{{ .Title }}</span>
  </div>

  <!-- 🔹 Title -->
  <h1 style="margin-bottom:20px;">{{ .Title }}</h1>

  <!-- 🔹 Content -->
  <div style="line-height:1.6;">
    {{ .Content }}
  </div>

  <!-- 🔹 Next / Prev -->
  <hr style="margin:30px 0;">

  <div style="display:flex; justify-content:space-between; font-size:14px;">

    <div>
      {{ with .PrevInSection }}
        <a href="{{ .RelPermalink }}">← {{ .Title }}</a>
      {{ end }}
    </div>

    <div>
      {{ with .NextInSection }}
        <a href="{{ .RelPermalink }}">{{ .Title }} →</a>
      {{ end }}
    </div>

  </div>

</div>

{{ end }}
